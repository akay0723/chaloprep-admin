// ============ ADAPTIVE LOGIC ============
function getNextDiff(curr,correct,taken,allowed){
  const i=DIFFS.indexOf(curr);
  if(correct===null) return DIFFS[Math.max(0,i-1)];
  if(correct){
    return taken/allowed<0.5 ? DIFFS[Math.min(2,i+1)] : curr;
  }
  return DIFFS[Math.max(0,i-1)];
}

function buildQueue(exam,subj,count,startD){
  let pool=QB.filter(q=>q.exam===exam&&q.subject===subj);
  if(pool.length===0) pool=QB.filter(q=>q.exam===exam);
  if(pool.length===0) pool=[...QB];
  const byD={Easy:[],Medium:[],Hard:[]};
  pool.forEach(q=>byD[q.d].push({...q}));
  const result=[];
  let curD=startD;
  for(let i=0;i<count;i++){
    let bucket=byD[curD];
    if(bucket.length===0){
      bucket=byD[DIFFS[0]]||pool;
    }
    const q={...bucket[i%bucket.length],aD:curD};
    result.push(q);
  }
  return result;
}

function getNextQ(pool,diff){
  const bucket=pool.filter(q=>q.d===diff);
  if(bucket.length===0) return {...pool[Math.floor(Math.random()*pool.length)],aD:diff};
  const idx=Math.floor(Math.random()*bucket.length);
  return {...bucket[idx],aD:diff};
}

// TEST ENGINE
function TestEnginePage({cfg,onDone}){
  const pool=useRef(QB.filter(q=>q.exam===cfg.exam&&q.subject===cfg.subj));
  if(pool.current.length===0) pool.current=QB.filter(q=>q.exam===cfg.exam);
  if(pool.current.length===0) pool.current=[...QB];
  const [qs,setQs]=useState(()=>buildQueue(cfg.exam,cfg.subj,cfg.n,cfg.diff));
  const [cur,setCur]=useState(0);
  const [sel,setSel]=useState(null);
  const [done,setDone]=useState(false);
  const [tLeft,setTLeft]=useState(DIFF_TIME[cfg.diff]);
  const [results,setResults]=useState([]);
  const [dPath,setDPath]=useState([cfg.diff]);
  const startT=useRef(Date.now());
  const timedOut=useRef(false);
  const q=qs[cur];
  const timeAllowed=DIFF_TIME[q?.aD||'Medium'];

  useEffect(()=>{
    if(!q) return;
    setTLeft(DIFF_TIME[q.aD]);
    setSel(null);
    setDone(false);
    timedOut.current=false;
    startT.current=Date.now();
  },[cur]);

  useEffect(()=>{
    if(done) return;
    const iv=setInterval(()=>setTLeft(t=>Math.max(0,t-1)),1000);
    return()=>clearInterval(iv);
  },[cur,done]);

  useEffect(()=>{
    if(tLeft===0&&!done&&!timedOut.current){
      timedOut.current=true;
      submitAnswer(null,true);
    }
  },[tLeft,done]);

  function submitAnswer(answer,timeout=false){
    if(done) return;
    setDone(true);
    const taken=Math.round((Date.now()-startT.current)/1000);
    const correct=timeout?false:(answer===null?null:answer===q.ans);
    const res={qid:q.id,q:q.q,topic:q.topic,sub:q.sub,diff:q.aD,sel:answer,ans:q.ans,correct,taken,allowed:timeAllowed,skipped:answer===null&&!timeout,timeout};
    const newResults=[...results,res];
    const nextD=getNextDiff(q.aD,timeout?false:(answer===null?null:answer===q.ans),taken,timeAllowed);
    setResults(newResults);
    setDPath(p=>[...p,nextD]);
    if(cur+1>=qs.length){
      setTimeout(()=>onDone(newResults,[...dPath,nextD]),700);
    } else {
      setTimeout(()=>{
        const updQ=[...qs];
        const nq=getNextQ(pool.current,nextD);
        updQ[cur+1]={...nq,aD:nextD};
        setQs(updQ);
        setCur(c=>c+1);
      },600);
    }
  }

  if(!q) return null;
  const pct=(tLeft/timeAllowed)*100;
  const timerColor=pct>50?'#10B981':pct>20?'#F59E0B':'#EF4444';
  const diffColor={Easy:'#10B981',Medium:'#F59E0B',Hard:'#EF4444'}[q.aD];
  const C=2*Math.PI*28;
  const lastR=results[results.length-1];

  return React.createElement('div',{style:{minHeight:'100vh',background:'var(--c-slate-50)',display:'flex',alignItems:'center',justifyContent:'center',padding:16},className:'page'},

      // Progress
      React.createElement('div',{style:{marginBottom:12}},
        React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
          React.createElement('span',{style:{fontSize:13,color:'var(--c-slate-500)',fontWeight:600}},'Question ',cur+1,' of ',qs.length),
          React.createElement('span',{style:{fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:99,background:diffColor+'22',color:diffColor}},q.aD)
        ),
        React.createElement('div',{className:'progress'},
          React.createElement('div',{className:'progress-fill',style:{width:`${(cur/qs.length)*100}%`}})
        )
      ),
      React.createElement('div',{className:'card p-8'},
        // Timer + meta
        React.createElement('div',{style:{display:'flex',alignItems:'center',gap:16,marginBottom:20}},
          React.createElement('div',{style:{position:'relative',width:64,height:64,flexShrink:0}},
            React.createElement('svg',{width:64,height:64,viewBox:'0 0 64 64',style:{transform:'rotate(-90deg)'}},
              React.createElement('circle',{cx:32,cy:32,r:28,fill:'none',stroke:'var(--c-slate-100)',strokeWidth:6}),
              React.createElement('circle',{cx:32,cy:32,r:28,fill:'none',stroke:timerColor,strokeWidth:6,strokeDasharray:C,strokeDashoffset:C*(1-pct/100),className:'timer-ring'})
            ),
            React.createElement('div',{style:{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:800,color:timerColor}},tLeft,'s')
          ),
          React.createElement('div',null,
            React.createElement('p',{style:{fontSize:11,color:'var(--c-slate-400)',fontWeight:600}},q.topic,' · ',q.sub),
            React.createElement('p',{style:{fontSize:11,color:'var(--c-slate-300)'}},cfg.exam,' Exam')
          )
        ),
        // Question
        React.createElement('h2',{style:{fontSize:16,fontWeight:700,color:'var(--c-slate-800)',marginBottom:20,lineHeight:1.6}},cur+1,'. ',q.q),
        // Options
        React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:10,marginBottom:20}},
          q.opts.map((opt,i)=>{
            let cls='option-btn';
            if(done){
              if(i===q.ans) cls+=' correct';
              else if(i===sel&&i!==q.ans) cls+=' wrong';
              else cls+=' faded';
            } else if(sel===i) cls+=' selected';

        // Action buttons

// ADMIN ADD QUESTION
function AdminAddQuestion({go,onAdd}){
  const [form,setForm]=useState({exam:'',subj:'',topic:'',sub:'',diff:'Medium',q:'',o1:'',o2:'',o3:'',o4:'',ans:'0'});
  const [saved,setSaved]=useState(false);
  const u=k=>v=>setForm(f=>({...f,[k]:v}));
  const handle=()=>{
    if(!form.exam||!form.q||!form.o1) return;
    onAdd({id:Date.now(),exam:form.exam,subject:form.subj,topic:form.topic,sub:form.sub,d:form.diff,q:form.q,opts:[form.o1,form.o2,form.o3,form.o4],ans:Number(form.ans)});
    setSaved(true);
    setTimeout(()=>{setSaved(false);go('adminQuestions');},1500);
  };
  return React.createElement('div',null,
    React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:20}},
      React.createElement('button',{onClick:()=>go('adminQuestions'),style:{background:'none',border:'none',color:'var(--c-slate-400)',cursor:'pointer',fontSize:13,fontFamily:'inherit'}},'← Back'),
      React.createElement('div',null,
        React.createElement('h1',{style:{fontSize:22,fontWeight:800,color:'var(--c-slate-800)'}},'Add New Question'),
        React.createElement('p',{style:{color:'var(--c-slate-400)',fontSize:13,marginTop:4}},'Contribute to the question bank')
      )
    ),
    saved&&React.createElement('div',{style:{marginBottom:14,background:'var(--c-emerald-l)',border:'1px solid #A7F3D0',color:'#065F46',borderRadius:12,padding:'12px 16px',fontSize:13,fontWeight:700}},'✅ Question saved successfully! Redirecting...'),
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}},
      React.createElement('div',{className:'card p-6'},
        React.createElement('div',{style:{fontWeight:700,fontSize:14,color:'var(--c-slate-700)',marginBottom:16}},'Question Metadata'),
        [
          {k:'exam',l:'Exam',type:'sel',opts:EXAMS},
          {k:'subj',l:'Subject',type:'sel',opts:SUBS[form.exam]||[]},
          {k:'topic',l:'Topic',type:'txt',ph:'e.g. Mechanics'},
          {k:'sub',l:'Sub-Topic',type:'txt',ph:'e.g. Kinematics'},
          {k:'diff',l:'Difficulty',type:'sel',opts:DIFFS}
        ].map(f=>React.createElement('div',{key:f.k,style:{marginBottom:14}},
          React.createElement('label',{className:'label'},f.l),
          f.type==='sel'?React.createElement('select',{className:'select',value:form[f.k],onChange:e=>u(f.k)(e.target.value)},
            React.createElement('option',{value:''},'Select '+f.l),
            (f.opts||[]).map(o=>React.createElement('option',{key:o,value:o},o))
          ):React.createElement('input',{className:'input',placeholder:f.ph,value:form[f.k],onChange:e=>u(f.k)(e.target.value)})
        ))
      ),
      React.createElement('div',{className:'card p-6'},
        React.createElement('div',{style:{fontWeight:700,fontSize:14,color:'var(--c-slate-700)',marginBottom:16}},'Question & Options'),
        React.createElement('div',{style:{marginBottom:14}},
          React.createElement('label',{className:'label'},'Question Text'),
          React.createElement('textarea',{className:'input',rows:3,placeholder:'Enter the question...',value:form.q,onChange:e=>u('q')(e.target.value),style:{resize:'none',fontFamily:'inherit'}})
        ),
        [1,2,3,4].map(i=>React.createElement('div',{key:i,style:{marginBottom:12}},
          React.createElement('label',{className:'label'},'Option '+String.fromCharCode(64+i)),
          React.createElement('input',{className:'input',placeholder:'Option '+i,value:form['o'+i],onChange:e=>u('o'+i)(e.target.value)})
        )),
        React.createElement('div',{style:{marginBottom:20}},
          React.createElement('label',{className:'label'},'Correct Option'),
          React.createElement('select',{className:'select',value:form.ans,onChange:e=>u('ans')(e.target.value)},
            ['Option A','Option B','Option C','Option D'].map((o,i)=>React.createElement('option',{key:i,value:i},o))
          )
        ),
        React.createElement('div',{style:{display:'flex',gap:10}},
          React.createElement('button',{className:'btn btn-ghost',onClick:()=>go('adminQuestions')},'Cancel'),
          React.createElement('button',{className:'btn btn-accent',style:{flex:1},onClick:handle},'Save Question')
        )
      )
    )
  );
}

// ============ MAIN APP ============
function App(){
  const [page,setPage]=useState('landing');
  const [testCfg,setTestCfg]=useState(null);
  const [results,setResults]=useState([]);
  const [dPath,setDPath]=useState([]);
  const [adminQs,setAdminQs]=useState([...QB]);

  const go=p=>setPage(p);
  const onStart=cfg=>setTestCfg(cfg);
  const onDone=(res,path)=>{setResults(res);setDPath(path);go('results');};
  const onDel=id=>setAdminQs(qs=>qs.filter(q=>q.id!==id));
  const onAdd=q=>setAdminQs(qs=>[...qs,q]);

  const isAdmin=['adminDashboard','adminQuestions','adminAddQ','adminAnalytics'].includes(page);

  let content;
  switch(page){
    case 'landing': content=React.createElement(LandingPage,{go}); break;
    case 'auth': content=React.createElement(AuthPage,{go}); break;
    case 'roleSelect': content=React.createElement(RoleSelectPage,{go}); break;
    case 'userHome': content=React.createElement(UserHomePage,{go,onStart}); break;
    case 'instructions': content=React.createElement(InstructionsPage,{cfg:testCfg,go}); break;
    case 'test': content=React.createElement(TestEnginePage,{cfg:testCfg,onDone}); break;
    case 'results': content=React.createElement(ResultsPage,{results,dPath,cfg:testCfg,go}); break;
    case 'recommendations': content=React.createElement(RecommendationsPage,{results,cfg:testCfg,go}); break;
    case 'adminDashboard': content=React.createElement(AdminDashboard,null); break;
    case 'adminQuestions': content=React.createElement(AdminQuestions,{go,questions:adminQs,onDel}); break;
    case 'adminAddQ': content=React.createElement(AdminAddQuestion,{go,onAdd}); break;
    case 'adminAnalytics': content=React.createElement(AdminAnalytics,null); break;
    default: content=React.createElement(LandingPage,{go});
  }

  if(isAdmin) return React.createElement(AdminLayout,{page,go},content);
  return content;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
